<!DOCTYPE html>  
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Study Booking</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Manrope:wght@300;500;700&display=swap"
    rel="stylesheet"
  />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <style>
    /* ===== YOUR ORIGINAL CSS (UNCHANGED) ===== */
    :root {
      --black: #0b0b0e;
      --black-deep: #060608;
      --gold: #d4af37;
      --gold-soft: #f6d978;
      --ink: #f5f1e8;
      --glass: rgba(255, 255, 255, 0.06);
      --border: rgba(212, 175, 55, 0.35);
      --shadow: rgba(212, 175, 55, 0.25);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Manrope", "Segoe UI", sans-serif;
      color: var(--ink);
      background: var(--black);
    }

    /* (all your CSS unchanged — omitted here ONLY for space in chat) */
  </style>
</head>

<body>
  <div class="page">
    <header>
      <div class="hero">
        <div>
          <div class="eyebrow">Villa Bravado</div>
          <h1>Study Log Booking System</h1>
          <p class="subtitle">
            Reserve your study slot in a premium, streamlined experience designed for focus and clarity.
          </p>
          <div class="notice">You may only book up to two hours under one name.</div>
        </div>
      </div>
    </header>

    <main>
      <div class="form-wrap">
        <form id="bookingForm">

          <div class="field">
            <label>Log Name</label>
            <select name="log_name" required>
              <option value="">Select Log</option>
              <option value="Sechaba">Sechaba</option>
              <option value="Lufhuno">Lufhuno</option>
            </select>
          </div>

          <div class="field">
            <label>Full Name</label>
            <input type="text" name="full_name" required>
          </div>

          <div class="field">
            <label>Student Number</label>
            <input type="text" name="student_number" required>
          </div>

          <div class="field">
            <label>Study Start Time</label>
            <input type="datetime-local" name="study_start" required>
          </div>

          <button type="submit">Book Slot</button>
        </form>

        <p id="message"></p>
      </div>
    </main>
  </div>

  <!-- MODAL (UNCHANGED) -->
  <div class="modal" id="successModal">
    <div class="modal-card">
      <h3>Booking Confirmed</h3>
      <div class="details">
        <div><span>Log</span><strong id="detailLog"></strong></div>
        <div><span>Full Name</span><strong id="detailName"></strong></div>
        <div><span>Student Number</span><strong id="detailStudent"></strong></div>
        <div><span>Start Time</span><strong id="detailStart"></strong></div>
      </div>
      <button id="closeModal">Close</button>
    </div>
  </div>

  <script>
    const supabaseUrl = "https://hldtrofwejpxixtbrthz.supabase.co";
    const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhsZHRyb2Z3ZWpweGl4dGJydGh6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1OTUxMTQsImV4cCI6MjA4OTE3MTExNH0.N5DsYTVezE_DL5fBGdobyIdTlauklJgB7UeTsNybDv8";
    const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

    const form = document.getElementById("bookingForm");
    const message = document.getElementById("message");

    const modal = document.getElementById("successModal");
    const closeModalBtn = document.getElementById("closeModal");

    const detailLog = document.getElementById("detailLog");
    const detailName = document.getElementById("detailName");
    const detailStudent = document.getElementById("detailStudent");
    const detailStart = document.getElementById("detailStart");

    function openModal(d) {
      detailLog.textContent = d.log_name;
      detailName.textContent = d.full_name;
      detailStudent.textContent = d.student_number;
      detailStart.textContent = d.study_start;
      modal.style.display = "block";
    }

    function closeModal() {
      modal.style.display = "none";
    }

    closeModalBtn.addEventListener("click", closeModal);

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      message.textContent = "Booking...";

      const dataToInsert = {
        log_name: form.log_name.value,
        full_name: form.full_name.value.trim(),
        student_number: form.student_number.value.trim(),
        study_start: form.study_start.value
      };

      try {

        // =========================
        // CHECK SAME STUDENT SAME DAY (FIXED - NO ILIKE)
        // =========================
        const today = new Date().toISOString().split("T")[0];
        const startOfDay = `${today}T00:00:00`;
        const endOfDay = `${today}T23:59:59`;

        const { data: existingBooking, error: checkError } = await supabaseClient
          .from("study_bookings")
          .select("*")
          .eq("student_number", dataToInsert.student_number)
          .gte("study_start", startOfDay)
          .lte("study_start", endOfDay);

        if (checkError) throw checkError;

        if (existingBooking.length > 0) {
          message.textContent = "❌ You already have a booking for today.";
          return;
        }

        // =========================
        // CREATE END TIME (2 HOURS)
        // =========================
        const start = new Date(dataToInsert.study_start);
        const end = new Date(start);
        end.setHours(end.getHours() + 2);

        dataToInsert.study_end = end.toISOString();

        // =========================
        // CHECK OVERLAPS
        // =========================
        const { data: clashes, error: clashError } = await supabaseClient
          .from("study_bookings")
          .select("*")
          .eq("log_name", dataToInsert.log_name)
          .lt("study_start", dataToInsert.study_end)
          .gt("study_end", dataToInsert.study_start);

        if (clashError) throw clashError;

        if (clashes.length > 0) {
          message.textContent = "❌ This time slot is already taken.";
          return;
        }

        // =========================
        // INSERT
        // =========================
        const { error } = await supabaseClient
          .from("study_bookings")
          .insert([dataToInsert]);

        if (error) throw error;

        message.textContent = "✅ Booking successful!";
        openModal(dataToInsert);
        form.reset();

      } catch (err) {
        console.error(err);
        message.textContent = "❌ Error: " + err.message;
      }
    });
  </script>
</body>
</html>

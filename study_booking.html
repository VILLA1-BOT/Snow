<!DOCTYPE html>  
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Study Booking</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Manrope:wght@300;500;700&display=swap"
    rel="stylesheet"
  />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <style>
    /* YOUR CSS UNTOUCHED */
  </style>
</head>

<body>

  <!-- YOUR HTML UNTOUCHED -->
  
  <script>
    const supabaseUrl = "https://hldtrofwejpxixtbrthz.supabase.co";
    const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhsZHRyb2Z3ZWpweGl4dGJydGh6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1OTUxMTQsImV4cCI6MjA4OTE3MTExNH0.N5DsYTVezE_DL5fBGdobyIdTlauklJgB7UeTsNybDv8";
    const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

    const form = document.getElementById("bookingForm");
    const message = document.getElementById("message");

    const modal = document.getElementById("successModal");
    const closeModalBtn = document.getElementById("closeModal");
    const detailLog = document.getElementById("detailLog");
    const detailName = document.getElementById("detailName");
    const detailStudent = document.getElementById("detailStudent");
    const detailStart = document.getElementById("detailStart");

    function openModal(details) {
      detailLog.textContent = details.log_name;
      detailName.textContent = details.full_name;
      detailStudent.textContent = details.student_number;
      detailStart.textContent = details.study_start;
      modal.classList.add("show");
      modal.setAttribute("aria-hidden", "false");
    }

    function closeModal() {
      modal.classList.remove("show");
      modal.setAttribute("aria-hidden", "true");
    }

    modal.addEventListener("click", (e) => {
      if (e.target === modal) closeModal();
    });

    closeModalBtn.addEventListener("click", closeModal);

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      message.textContent = "Booking...";

      const dataToInsert = {
        log_name: form.log_name.value,
        full_name: form.full_name.value.trim(),
        student_number: form.student_number.value.trim(),
        study_start: form.study_start.value
      };

      try {

        // =========================
        // CHECK IF STUDENT ALREADY BOOKED TODAY
        // =========================

        const today = new Date().toISOString().split("T")[0];

        const startOfDay = `${today}T00:00:00`;
        const endOfDay = `${today}T23:59:59`;

        const { data: existingBooking, error: checkError } = await supabaseClient
          .from("study_bookings")
          .select("*")
          .eq("student_number", dataToInsert.student_number)
          .gte("study_start", startOfDay)
          .lte("study_start", endOfDay);

        if (checkError) throw checkError;

        if (existingBooking.length > 0) {
          message.textContent = "❌ You already have a booking for today.";
          return;
        }

        const start = new Date(dataToInsert.study_start);

        // assume user selects ONLY start time → we auto-force 2 hours
        const end = new Date(start);
        end.setHours(end.getHours() + 2);

        dataToInsert.study_end = end.toISOString();

        const { data: clashes, error: clashError } = await supabaseClient
          .from("study_bookings")
          .select("*")
          .eq("log_name", dataToInsert.log_name)
          .lt("study_start", dataToInsert.study_end)
          .gt("study_end", dataToInsert.study_start);

        if (clashError) throw clashError;

        if (clashes.length > 0) {
          message.textContent = "❌ This time slot is already taken.";
          return;
        }

        // =========================
        // 3. INSERT INTO SUPABASE
        // =========================
        const { error } = await supabaseClient
          .from("study_bookings")
          .insert([dataToInsert]);

        if (error) throw error;

        // Success message + modal
        message.textContent = "✅ Booking successful!";
        openModal(dataToInsert);
        form.reset();

        // =========================
        // 4. SEND EMAIL NOTIFICATION
        // =========================
       
        //  await fetch("https://hldtrofwejpxixtbrthz.supabase.co/functions/v1/send-study-booking-email", {
        // method: "POST",
        // headers: {
        //   "Content-Type": "application/json"
        // },
        // body: JSON.stringify({
        //   log_name: dataToInsert.log_name,
        //   full_name: dataToInsert.full_name,
        //   student_number: dataToInsert.student_number,
        //   study_start: dataToInsert.study_start
        // })
        // });

      } catch (err) {
        console.error(err);
        message.textContent = "❌ Error: " + err.message;
      }
    });
  </script>

</body>
</html>

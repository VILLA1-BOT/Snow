<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Villa Bravado | Master Hub</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --navy: #0A192F; --red: #D32F2F; --white: #E6F1FF; --glass: rgba(10, 25, 47, 0.9); --border: rgba(255, 255, 255, 0.1); }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #020c1b; color: var(--white); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        header { padding: 15px; text-align: center; background: var(--glass); border-bottom: 2px solid var(--red); box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .nav-tabs { display: flex; justify-content: center; gap: 10px; margin-top: 10px; }
        .tab-btn { background: transparent; color: var(--white); border: 1px solid var(--border); padding: 8px 15px; border-radius: 20px; cursor: pointer; transition: 0.3s; font-weight: bold; }
        .tab-btn.active { background: var(--red); border-color: var(--red); box-shadow: 0 0 10px rgba(211, 47, 47, 0.5); }
        .container { flex: 1; padding: 20px; display: flex; justify-content: center; overflow-y: auto; }
        .tab-content { display: none; width: 100%; max-width: 600px; background: var(--glass); border: 1px solid var(--border); border-radius: 15px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .tab-content.active { display: block; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* MR ROAR LION */
        .lion-box { text-align: center; margin-bottom: 15px; }
        .lion-icon { font-size: 60px; display: inline-block; animation: bounce 2s infinite ease-in-out; filter: drop-shadow(0 0 10px var(--red)); }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px) scale(1.1); } }
        
        .timer-display { font-size: 65px; font-weight: bold; text-align: center; margin: 20px 0; text-shadow: 0 0 20px rgba(230, 241, 255, 0.2); }
        .chat-box { height: 280px; overflow-y: auto; background: rgba(0,0,0,0.4); border-radius: 12px; padding: 15px; margin-bottom: 15px; display: flex; flex-direction: column; gap: 12px; border: 1px solid var(--border); }
        .msg { padding: 12px; border-radius: 12px; font-size: 14px; line-height: 1.5; max-width: 85%; word-wrap: break-word; }
        .msg.bot { background: var(--red); align-self: flex-start; border-bottom-left-radius: 2px; }
        .msg.user { background: var(--navy); align-self: flex-end; border: 1px solid var(--border); border-bottom-right-radius: 2px; }
        
        .input-group { display: flex; gap: 8px; }
        input { flex: 1; padding: 12px; border-radius: 8px; border: 1px solid var(--border); background: #112240; color: white; outline: none; }
        input:focus { border-color: var(--red); }
        .btn { background: var(--red); color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn:active { transform: scale(0.95); }
    </style>
</head>
<body>

<header>
    <h1 style="color: var(--red); margin: 0; font-size: 24px; letter-spacing: 2px;">VILLA BRAVADO</h1>
    <div class="nav-tabs">
        <button class="tab-btn active" onclick="switchTab('focus', this)">Focus</button>
        <button class="tab-btn" onclick="switchTab('roar', this)">Mr Roar 🦁</button>
    </div>
</header>

<div class="container">
    <div id="focus" class="tab-content active">
        <div class="timer-display" id="time-display">25:00</div>
        <div style="display:flex; justify-content:center; gap:15px;">
            <button class="btn" onclick="startTimer()">Start</button>
            <button class="btn" style="background:#334155" onclick="pauseTimer()">Pause</button>
            <button class="btn" style="background:#334155" onclick="resetTimer()">Reset</button>
        </div>
    </div>

    <div id="roar" class="tab-content">
        <div class="lion-box">
            <div class="lion-icon">🦁</div>
            <div style="color: var(--red); font-weight: bold; letter-spacing: 1px;">THE GUARDIAN IS AWAKE</div>
        </div>
        <div class="chat-box" id="chat-box">
            <div class="msg bot">Noster Firmus Intimus, Villaman! I have secured the corridors. What are we conquering today?</div>
        </div>
        <div class="input-group">
            <input type="text" id="chat-in" placeholder="Speak to the Lion..." onkeypress="if(event.key==='Enter') sendMessage()">
            <button class="btn" onclick="sendMessage()">Send</button>
        </div>
    </div>
</div>

<script>
    // --- DATABASE CONFIG ---
    const supabaseUrl = 'https://hldtrofwejpxixtbrthz.supabase.co';
    const supabaseKey = 'sb_publishable_YrPYdPgxvFxQ9RZ6YTr7Vg_Y-bNM6xh';
    const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);
    let geminiKey = null;

    // Initialize: Get key from Supabase
    async function init() {
        try {
            const { data, error } = await supabaseClient.from('app_secrets').select('key_value').eq('key_name', 'GEMINI_API_KEY').single();
            if (data) {
                geminiKey = data.key_value.trim();
            } else {
                addMsg("The Vault key is missing. Check Supabase!", 'bot');
            }
        } catch (e) {
            addMsg("Connection to the Pillars lost.", 'bot');
        }
    }
    init();

    // --- NAVIGATION ---
    function switchTab(id, btn) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
    }

    // --- FOCUS TIMER ---
    let timeLeft = 25 * 60, tInterval = null;
    function updateDisplay() { 
        let m = Math.floor(timeLeft / 60), s = timeLeft % 60; 
        document.getElementById('time-display').innerText = `${m}:${s < 10 ? '0' : ''}${s}`; 
    }
    function startTimer() { 
        if (!tInterval) {
            tInterval = setInterval(() => { 
                if (timeLeft > 0) { timeLeft--; updateDisplay(); } 
                else { clearInterval(tInterval); addMsg("Focus session complete, Villaman! Take a breath.", 'bot'); }
            }, 1000); 
        }
    }
    function pauseTimer() { clearInterval(tInterval); tInterval = null; }
    function resetTimer() { pauseTimer(); timeLeft = 25 * 60; updateDisplay(); }

    // --- MR ROAR AI CHAT ---
    async function sendMessage() {
        const input = document.getElementById('chat-in');
        const userVal = input.value.trim();
        if (!userVal || !geminiKey) return;

        addMsg(userVal, 'user');
        input.value = "";

        try {
            // THE FIX: v1beta + gemini-1.5-flash-latest
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash-latest:generateContent?key=${geminiKey}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: "You are Mr Roar, the authoritative yet supportive lion guardian of Villa Bravado. Use the motto Noster Firmus Intimus. Address the user as Villaman. Keep answers bold and under 50 words: " + userVal }] }]
                })
            });

            const result = await response.json();
            
            if (result.candidates && result.candidates[0].content) {
                addMsg(result.candidates[0].content.parts[0].text, 'bot');
            } else if (result.error) {
                addMsg("Google error: " + result.error.message, 'bot');
            } else {
                addMsg("The spirits are silent. Try rephrasing your request.", 'bot');
            }
        } catch (err) {
            addMsg("The Wi-Fi spirits are angry. Check your connection!", 'bot');
        }
    }

    function addMsg(t, s) {
        const b = document.getElementById('chat-box');
        const m = document.createElement('div');
        m.className = `msg ${s}`;
        m.innerText = t;
        b.appendChild(m);
        b.scrollTop = b.scrollHeight;
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Villa Bravado | Master Hub</title>
    <style>
        :root { --navy: #0A192F; --red: #D32F2F; --white: #E6F1FF; --glass: rgba(10, 25, 47, 0.9); --border: rgba(255, 255, 255, 0.1); }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #020c1b; color: var(--white); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        header { padding: 15px; text-align: center; background: var(--glass); border-bottom: 2px solid var(--red); }
        .nav-tabs { display: flex; justify-content: center; gap: 10px; margin-top: 10px; }
        .tab-btn { background: transparent; color: var(--white); border: 1px solid var(--border); padding: 8px 15px; border-radius: 20px; cursor: pointer; }
        .tab-btn.active { background: var(--red); border-color: var(--red); }
        .container { flex: 1; padding: 20px; display: flex; justify-content: center; overflow-y: auto; }
        .tab-content { display: none; width: 100%; max-width: 600px; background: var(--glass); border: 1px solid var(--border); border-radius: 15px; padding: 20px; }
        .tab-content.active { display: block; }
        .lion-icon { font-size: 60px; text-align: center; display: block; margin-bottom: 10px; animation: bounce 2s infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .timer-display { font-size: 60px; font-weight: bold; text-align: center; margin: 15px 0; }
        .chat-box { height: 250px; overflow-y: auto; background: rgba(0,0,0,0.3); border-radius: 10px; padding: 15px; margin-bottom: 15px; display: flex; flex-direction: column; gap: 10px; border: 1px solid var(--border); }
        .msg { padding: 10px; border-radius: 10px; font-size: 14px; line-height: 1.4; max-width: 85%; }
        .msg.bot { background: var(--red); align-self: flex-start; }
        .msg.user { background: var(--navy); align-self: flex-end; border: 1px solid var(--border); }
        .input-group { display: flex; gap: 5px; }
        input { flex: 1; padding: 10px; border-radius: 5px; border: 1px solid var(--border); background: #112240; color: white; }
        .btn { background: var(--red); color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <h1 style="color: var(--red); margin: 0; font-size: 22px;">VILLA BRAVADO HUB</h1>
    <div class="nav-tabs">
        <button class="tab-btn active" onclick="switchTab('focus')">Focus</button>
        <button class="tab-btn" onclick="switchTab('roar')">Mr Roar 🦁</button>
    </div>
</header>

<div class="container">
    <div id="focus" class="tab-content active">
        <div class="timer-display" id="time-display">25:00</div>
        <div style="display:flex; justify-content:center; gap:10px;">
            <button class="btn" onclick="startTimer()">Start</button>
            <button class="btn" style="background:#444" onclick="pauseTimer()">Pause</button>
            <button class="btn" style="background:#444" onclick="resetTimer()">Reset</button>
        </div>
    </div>

    <div id="roar" class="tab-content">
        <span class="lion-icon">🦁</span>
        <div class="chat-box" id="chat-box">
            <div class="msg bot">I have bypassed the blocked corridors. I am here, Villaman!</div>
        </div>
        <div class="input-group">
            <input type="text" id="chat-in" placeholder="Speak, Villaman..." onkeypress="if(event.key==='Enter') sendMessage()">
            <button class="btn" onclick="sendMessage()">Send</button>
        </div>
    </div>
</div>

<script>
    // HARDCODED KEY - No Supabase needed to test buttons!
    const MY_KEY = "AIzaSyD2mp9J4pO5OrSBbpU5myed_4GG9S4SH50";

    function switchTab(id) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        event.target.classList.add('active');
    }

    let timeLeft = 25*60, tInterval = null;
    function updateD() { 
        let m=Math.floor(timeLeft/60), s=timeLeft%60; 
        document.getElementById('time-display').innerText = `${m}:${s<10?'0':''}${s}`; 
    }
    function startTimer() { if(!tInterval) tInterval = setInterval(()=>{ if(timeLeft>0){timeLeft--; updateD();}else{clearInterval(tInterval);}}, 1000); }
    function pauseTimer() { clearInterval(tInterval); tInterval = null; }
    function resetTimer() { pauseTimer(); timeLeft=25*60; updateD(); }

    async function sendMessage() {
        const input = document.getElementById('chat-in');
        const userVal = input.value.trim();
        if(!userVal) return;

        addMsg(userVal, 'user');
        input.value = "";

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${MY_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: "You are Mr Roar, the lion mentor of Villa Bravado. Use the motto Noster Firmus Intimus. Answer briefly: " + userVal }] }]
                })
            });

            const result = await response.json();
            if(result.candidates) {
                addMsg(result.candidates[0].content.parts[0].text, 'bot');
            } else {
                addMsg("Error: " + (result.error ? result.error.message : "Connection failed"), 'bot');
            }
        } catch (err) {
            addMsg("The corridors are still heavy with interference.", 'bot');
        }
    }

    function addMsg(t, s) {
        const b = document.getElementById('chat-box');
        const m = document.createElement('div');
        m.className = `msg ${s}`;
        m.innerText = t;
        b.appendChild(m);
        b.scrollTop = b.scrollHeight;
    }
</script>
</body>
</html>

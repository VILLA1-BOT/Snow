<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Villa Bravado | Mr Roar's Den</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --navy: #0A192F;
            --red: #D32F2F;
            --white: #E6F1FF;
            --glass: rgba(10, 25, 47, 0.85);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #020c1b 0%, #112240 100%);
            color: var(--white);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            padding: 20px;
            text-align: center;
            background: var(--glass);
            border-bottom: 2px solid var(--red);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        }

        .nav-tabs {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 15px;
        }

        .tab-btn {
            background: transparent;
            color: var(--white);
            border: 1px solid var(--border);
            padding: 10px 20px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .tab-btn.active {
            background: var(--red);
            border-color: var(--red);
            box-shadow: 0 0 15px rgba(211, 47, 47, 0.6);
        }

        .container {
            flex: 1;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            overflow-y: auto;
        }

        .tab-content {
            display: none;
            width: 100%;
            max-width: 700px;
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 25px;
            animation: slideUp 0.4s ease;
        }

        .tab-content.active { display: block; }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* TIMER & TASKS */
        .timer-display { font-size: 70px; font-weight: bold; text-align: center; margin: 20px 0; color: var(--white); text-shadow: 0 0 20px rgba(255,255,255,0.2); }
        .btn { background: var(--red); color: white; border: none; padding: 12px 20px; border-radius: 10px; cursor: pointer; font-weight: bold; }
        .input-group { display: flex; gap: 10px; margin-top: 20px; }
        input { flex: 1; padding: 12px; border-radius: 10px; border: 1px solid var(--border); background: rgba(255,255,255,0.05); color: white; }

        /* MR ROAR VISIBILITY */
        .roar-avatar-container {
            text-align: center;
            margin-bottom: 20px;
        }

        @keyframes dance {
            0%, 100% { transform: scale(1) rotate(0deg); }
            25% { transform: scale(1.2) rotate(-5deg); }
            75% { transform: scale(1.2) rotate(5deg); }
        }

        .lion-icon {
            font-size: 80px;
            display: inline-block;
            animation: dance 2s infinite ease-in-out;
            filter: drop-shadow(0 0 10px var(--red));
        }

        .chat-box {
            height: 300px;
            overflow-y: auto;
            background: rgba(0,0,0,0.3);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .msg { padding: 10px 15px; border-radius: 12px; max-width: 80%; font-size: 14px; line-height: 1.4; }
        .msg.bot { background: var(--red); align-self: flex-start; border-bottom-left-radius: 0; }
        .msg.user { background: var(--navy); align-self: flex-end; border: 1px solid var(--border); border-bottom-right-radius: 0; }
    </style>
</head>
<body>

<header>
    <h1 style="color: var(--red); margin: 0; letter-spacing: 3px;">VILLA BRAVADO</h1>
    <div class="nav-tabs">
        <button class="tab-btn active" onclick="switchTab('focus')">Focus</button>
        <button class="tab-btn" onclick="switchTab('tasks')">Tasks</button>
        <button class="tab-btn" onclick="switchTab('roar')">Mr Roar 🦁</button>
    </div>
</header>

<div class="container">
    <div id="focus" class="tab-content active">
        <div class="timer-display" id="time-display">25:00</div>
        <div style="display:flex; justify-content:center; gap:10px;">
            <button class="btn" onclick="startTimer()">Start</button>
            <button class="btn" style="background:#444" onclick="pauseTimer()">Pause</button>
            <button class="btn" style="background:#444" onclick="resetTimer()">Reset</button>
        </div>
    </div>

    <div id="tasks" class="tab-content">
        <h3>Task Chunker</h3>
        <div class="input-group">
            <input type="text" id="task-in" placeholder="Enter a study step...">
            <button class="btn" onclick="addTask()">Add</button>
        </div>
        <ul id="task-list" style="list-style:none; padding:0; margin-top:20px;"></ul>
    </div>

    <div id="roar" class="tab-content">
        <div class="roar-avatar-container">
            <div class="lion-icon">🦁</div>
            <h2 style="margin: 5px 0; color: var(--red);">MR ROAR</h2>
            <small style="color: #8892b0;">Guardian of the Pillars & Corridors</small>
        </div>
        <div class="chat-box" id="chat-box">
            <div class="msg bot">I am here, Villaman! The corridors of Villa Bravado are quiet, meaning it's time to work. What are we conquering?</div>
        </div>
        <div class="input-group">
            <input type="text" id="chat-in" placeholder="Talk to the lion..." onkeypress="if(event.key==='Enter') sendMessage()">
            <button class="btn" onclick="sendMessage()">Send</button>
        </div>
    </div>
</div>

<script>
    // --- DATABASE & AI ---
    const supabaseUrl = 'https://hldtrofwejpxixtbrthz.supabase.co';
    const supabaseKey = 'sb_publishable_YrPYdPgxvFxQ9RZ6YTr7Vg_Y-bNM6xh';
    const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);
    let geminiKey = null;

    async function getSecret() {
        const { data } = await supabaseClient.from('app_secrets').select('key_value').eq('key_name', 'GEMINI_API_KEY').single();
        if (data) geminiKey = data.key_value.trim(); // TRIM added to prevent 404 hidden spaces
    }
    getSecret();

    // --- TABS ---
    function switchTab(id) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        event.target.classList.add('active');
    }

    // --- TIMER ---
    let timeLeft = 25 * 60, timer = null;
    function updateT() {
        let m = Math.floor(timeLeft/60), s = timeLeft%60;
        document.getElementById('time-display').innerText = `${m}:${s<10?'0':''}${s}`;
    }
    function startTimer() { if(!timer) timer = setInterval(()=>{ if(timeLeft>0){timeLeft--; updateT();}else{clearInterval(timer);}}, 1000); }
    function pauseTimer() { clearInterval(timer); timer = null; }
    function resetTimer() { pauseTimer(); timeLeft = 25*60; updateT(); }

    // --- TASKS ---
    function addTask() {
        const val = document.getElementById('task-in').value;
        if(!val) return;
        const li = document.createElement('li');
        li.style = "background:rgba(255,255,255,0.05); padding:10px; margin-bottom:5px; border-radius:8px; border-left: 3px solid var(--red); display:flex; justify-content:space-between;";
        li.innerHTML = `<span>${val}</span><span style="cursor:pointer;color:var(--red)" onclick="this.parentElement.remove()">✕</span>`;
        document.getElementById('task-list').appendChild(li);
        document.getElementById('task-in').value = "";
    }

    // --- MR ROAR AI ---
    async function sendMessage() {
        const input = document.getElementById('chat-in');
        const text = input.value.trim();
        if(!text || !geminiKey) return;

        addMsg(text, 'user');
        input.value = "";

        const persona = "You are Mr Roar, the lion guardian of Villa Bravado. Use terms like 'Villaman', 'Pillars', 'Corridors', and 'Noster Firmus Intimus'. You are supportive, bold, and authoritative.";

        try {
            // FIXED URL: Using 'gemini-1.5-flash' with the correct v1beta path
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${geminiKey}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ role: "user", parts: [{ text: persona + "\n\nUser says: " + text }] }]
                })
            });

            const data = await res.json();
            if (data.candidates) {
                addMsg(data.candidates[0].content.parts[0].text, 'bot');
            } else {
                console.error(data);
                addMsg("The spirits are restless (Error 404/400). Check the API key in Supabase!", 'bot');
            }
        } catch (e) {
            addMsg("Connection lost in the corridors...", 'bot');
        }
    }

    function addMsg(t, s) {
        const b = document.getElementById('chat-box');
        const d = document.createElement('div');
        d.className = `msg ${s}`;
        d.innerText = t;
        b.appendChild(d);
        b.scrollTop = b.scrollHeight;
    }
</script>

</body>
</html>

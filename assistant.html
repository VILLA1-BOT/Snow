<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>V-Bot Assistant</title>
    <style>
        :root {
            --primary: #1a2a6c;
            --user-msg: #007bff;
            --bot-msg: #f0f2f5;
            --bg-gradient: linear-gradient(135deg, #1a2a6c, #b21f1f);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 0;
            background: var(--bg-gradient);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden; /* Prevents body scroll, only chat scrolls */
        }

        /* Top Navigation */
        .nav-header {
            padding: 15px 20px;
            display: flex;
            align-items: center;
            color: white;
            background: rgba(0,0,0,0.2);
            backdrop-filter: blur(5px);
        }

        .back-btn {
            text-decoration: none;
            color: white;
            font-size: 20px;
            margin-right: 15px;
            font-weight: bold;
        }

        /* Chat Area */
        #chat-window {
            flex-grow: 1;
            background: #ffffff;
            border-top-left-radius: 25px;
            border-top-right-radius: 25px;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.1);
        }

        .msg {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 15px;
            line-height: 1.5;
            word-wrap: break-word;
            white-space: pre-wrap; /* Keeps AI code/formatting clear */
        }

        .bot {
            background: var(--bot-msg);
            color: #222;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .user {
            background: var(--primary);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        /* Input Bar */
        .input-area {
            background: white;
            padding: 15px 20px 25px 20px; /* Extra bottom padding for iPhone notch */
            display: flex;
            gap: 10px;
            border-top: 1px solid #eee;
        }

        input {
            flex-grow: 1;
            padding: 14px 20px;
            border: 1px solid #ddd;
            border-radius: 30px;
            outline: none;
            font-size: 16px; /* Critical: Stops iPhone from zooming in */
            background: #f9f9f9;
        }

        input:focus {
            border-color: var(--primary);
            background: #fff;
        }

        button {
            background: var(--primary);
            color: white;
            border: none;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.2s;
            flex-shrink: 0;
        }

        button:active {
            transform: scale(0.9);
        }

        .typing {
            font-style: italic;
            font-size: 12px;
            color: #888;
        }
    </style>
</head>
<body>

    <div class="nav-header">
        <a href="index.html" class="back-btn">←</a>
        <div>
            <div style="font-weight: bold;">Villa AI Assistant</div>
            <div style="font-size: 10px; opacity: 0.8;">Powered by Groq Llama 3.1</div>
        </div>
    </div>

    <div id="chat-window">
        <div class="msg bot">
            Sharp! I'm <strong>V-Bot</strong>. I can help you with:
            • UFS CSIS2634 Modules
            • Bursary Applications
            • Residence Rules
            
            What's on your mind?
        </div>
    </div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Ask V-Bot something..." autocomplete="off">
        <button onclick="handleSend()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
        </button>
    </div>

<script>
    // 1. CONFIGURATION
    const GROQ_API_KEY = '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'; 
    const MODEL_ID = 'llama-3.1-8b-instant';

    async function handleSend() {
        const input = document.getElementById('userInput');
        const chatWindow = document.getElementById('chat-window');
        const userText = input.value.trim();
        
        if (userText === "") return;

        // 2. Add User Message
        addMessage(userText, 'user');
        input.value = "";
        
        // 3. Add Typing Indicator
        const typingId = 'typing-' + Date.now();
        addMessage("V-Bot is thinking...", 'bot typing', typingId);

        try {
            // 4. API Request
            const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${GROQ_API_KEY}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    model: MODEL_ID,
                    messages: [
                        {
                            role: "system", 
                            content: "You are V-Bot, a helpful assistant for Villa Bravado at UFS. You are an expert in SQL, T-SQL, and student funding. Keep answers concise, helpful, and use South African English/slang occasionally."
                        },
                        {
                            role: "user", 
                            content: userText
                        }
                    ],
                    temperature: 0.6
                })
            });

            if (!response.ok) throw new Error('API Error');

            const data = await response.json();
            
            // Remove typing indicator
            const typingElem = document.getElementById(typingId);
            if(typingElem) typingElem.remove();

            // 5. Add AI Response
            if (data.choices && data.choices[0]) {
                const aiResponse = data.choices[0].message.content;
                addMessage(aiResponse, 'bot');
            }

        } catch (error) {
            const typingElem = document.getElementById(typingId);
            if(typingElem) typingElem.remove();
            addMessage("Eish, I'm having trouble connecting. Check your data or API key.", 'bot');
            console.error(error);
        }
    }

    // Function to create and scroll messages
    function addMessage(text, type, id = null) {
        const chatWindow = document.getElementById('chat-window');
        const div = document.createElement('div');
        div.className = `msg ${type}`;
        if (id) div.id = id;
        div.innerText = text; // Secure way to prevent script injection
        
        chatWindow.appendChild(div);
        
        // Smooth scroll to bottom
        chatWindow.scrollTo({
            top: chatWindow.scrollHeight,
            behavior: 'smooth'
        });
    }

    // Handle Enter Key
    document.getElementById("userInput").addEventListener("keyup", function(event) {
        if (event.key === "Enter") handleSend();
    });
</script>

</body>
</html>

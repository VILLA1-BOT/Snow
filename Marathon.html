<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Last Man Standing</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg: #07111f;
      --panel: #0d1b2f;
      --panel-2: #10243d;
      --line: rgba(196, 223, 255, 0.14);
      --text: #eef6ff;
      --muted: #91a9c4;
      --cyan: #58d8ff;
      --lime: #38d986;
      --orange: #ffad4d;
      --red: #ff5f6d;
      --gray: #7d8da3;
      --shadow: 0 24px 80px rgba(0, 0, 0, 0.38);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 20% 12%, rgba(88, 216, 255, 0.17), transparent 30rem),
        linear-gradient(135deg, #07111f 0%, #0b1730 52%, #121a2b 100%);
      color: var(--text);
    }

    button,
    input {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.55;
    }

    .app {
      width: min(1280px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0 40px;
    }

    .topbar {
      display: grid;
      gap: 14px;
      margin-bottom: 18px;
    }

    .cover-panel {
      display: grid;
      gap: 10px;
    }

    .hero {
      position: relative;
      overflow: hidden;
      min-height: 245px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background:
        linear-gradient(120deg, rgba(7, 17, 31, 0.96), rgba(9, 26, 48, 0.7)),
        url("https://images.unsplash.com/photo-1524995997946-a1c2e315a42f?auto=format&fit=crop&w=1400&q=80") center/cover;
      box-shadow: var(--shadow);
      padding: 28px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
    }

    .hero::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, transparent, rgba(7, 17, 31, 0.82));
      pointer-events: none;
    }

    .hero > * {
      position: relative;
      z-index: 1;
    }

    .cover-toggle {
      width: fit-content;
    }

    .kicker {
      color: var(--cyan);
      font-size: 0.78rem;
      font-weight: 800;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      margin: 0 0 8px;
    }

    h1 {
      max-width: 720px;
      margin: 0;
      font-size: clamp(2rem, 4vw, 4rem);
      line-height: 0.95;
      letter-spacing: 0;
    }

    .control-menu {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(13, 27, 47, 0.9);
      box-shadow: var(--shadow);
    }

    .control-bar {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .control-menu {
      padding: 6px;
    }

    .control-menu summary {
      min-height: 44px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      color: var(--text);
      font-weight: 900;
      list-style: none;
      cursor: pointer;
      padding: 0 12px;
      background: rgba(255, 255, 255, 0.06);
    }

    .control-menu summary::-webkit-details-marker {
      display: none;
    }

    .control-menu summary::after {
      content: "v";
      color: var(--cyan);
      font-size: 0.85rem;
    }

    .control-menu[open] summary::after {
      transform: rotate(180deg);
    }

    .control-content {
      display: grid;
      gap: 10px;
      padding: 12px 6px 6px;
    }

    .panel-title {
      margin: 0;
      font-size: 1rem;
      letter-spacing: 0;
    }

    .panel-copy {
      margin: 0;
      color: var(--muted);
      font-size: 0.9rem;
      line-height: 1.45;
    }

    .primary-button,
    .ghost-button,
    .danger-button,
    .warm-button {
      min-height: 44px;
      border-radius: 8px;
      padding: 0 14px;
      color: var(--text);
      font-weight: 800;
      transition: transform 160ms ease, border-color 160ms ease, background 160ms ease;
    }

    .primary-button {
      background: linear-gradient(135deg, #1179a6, #23b39a);
      box-shadow: 0 12px 28px rgba(35, 179, 154, 0.22);
    }

    .ghost-button {
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.05);
    }

    .warm-button {
      background: rgba(255, 173, 77, 0.16);
      color: #ffd9aa;
      border: 1px solid rgba(255, 173, 77, 0.35);
    }

    .danger-button {
      background: rgba(255, 95, 109, 0.15);
      color: #ffc4ca;
      border: 1px solid rgba(255, 95, 109, 0.35);
    }

    .primary-button:hover,
    .ghost-button:hover,
    .danger-button:hover,
    .warm-button:hover {
      transform: translateY(-1px);
    }

    .sync-state {
      min-height: 20px;
      color: var(--muted);
      font-size: 0.82rem;
    }

    .auth-screen {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .auth-card {
      width: min(420px, 100%);
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(13, 27, 47, 0.94);
      box-shadow: var(--shadow);
      padding: 22px;
    }

    .auth-form {
      display: grid;
      gap: 12px;
      margin-top: 18px;
    }

    .auth-form input {
      width: 100%;
      min-height: 44px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.07);
      color: var(--text);
      padding: 0 12px;
      outline: none;
    }

    .auth-form input:focus {
      border-color: rgba(88, 216, 255, 0.65);
      box-shadow: 0 0 0 3px rgba(88, 216, 255, 0.12);
    }

    .auth-state {
      min-height: 20px;
      color: var(--muted);
      font-size: 0.84rem;
    }

    .is-hidden {
      display: none !important;
    }

    .add-form {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      margin-top: 12px;
    }

    .add-form input {
      width: 100%;
      min-height: 44px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.06);
      color: var(--text);
      padding: 0 14px;
      outline: none;
    }

    .add-form input:focus {
      border-color: rgba(88, 216, 255, 0.65);
      box-shadow: 0 0 0 3px rgba(88, 216, 255, 0.12);
    }

    .leaderboard {
      display: grid;
      gap: 12px;
    }

    .leaderboard-title {
      margin: 12px 0 10px;
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 12px;
    }

    .leaderboard-controls {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
      flex-wrap: wrap;
    }

    .search-input {
      min-height: 44px;
      width: min(260px, 100%);
      border-radius: 8px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.06);
      color: var(--text);
      padding: 0 12px;
      outline: none;
    }

    .search-input:focus {
      border-color: rgba(88, 216, 255, 0.65);
      box-shadow: 0 0 0 3px rgba(88, 216, 255, 0.12);
    }

    .leaderboard-title h2 {
      margin: 0;
      font-size: clamp(1.35rem, 3vw, 2.25rem);
      letter-spacing: 0;
    }

    .top-ten-pill {
      border: 1px solid rgba(88, 216, 255, 0.28);
      background: rgba(88, 216, 255, 0.09);
      color: #d8f7ff;
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 0.78rem;
      font-weight: 900;
      white-space: nowrap;
    }

    .participant-card {
      display: grid;
      grid-template-columns: 54px minmax(180px, 1fr) minmax(145px, 0.6fr) minmax(160px, 0.6fr) minmax(220px, auto);
      gap: 14px;
      align-items: center;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: linear-gradient(135deg, rgba(16, 36, 61, 0.94), rgba(10, 22, 38, 0.94));
      box-shadow: 0 14px 40px rgba(0, 0, 0, 0.24);
    }

    .rank {
      width: 44px;
      height: 44px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      background: rgba(88, 216, 255, 0.12);
      color: #c8f3ff;
      font-weight: 900;
    }

    .rank-move {
      margin-top: 4px;
      color: var(--muted);
      font-size: 0.72rem;
      font-weight: 900;
      text-align: center;
    }

    .rank-move.up {
      color: #9dffc7;
    }

    .rank-move.down {
      color: #ffd29b;
    }

    .participant-name {
      margin: 0 0 8px;
      font-size: 1.02rem;
      font-weight: 900;
      overflow-wrap: anywhere;
    }

    .badge-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .milestone-badge {
      border: 1px solid rgba(88, 216, 255, 0.28);
      background: rgba(88, 216, 255, 0.1);
      color: #d8f7ff;
      border-radius: 8px;
      padding: 5px 8px;
      font-size: 0.72rem;
      font-weight: 900;
    }

    .status {
      width: fit-content;
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 0.8rem;
      font-weight: 900;
    }

    .status.studying {
      color: #cfffe5;
      background: rgba(56, 217, 134, 0.16);
      border: 1px solid rgba(56, 217, 134, 0.36);
    }

    .status.break {
      color: #ffe0b7;
      background: rgba(255, 173, 77, 0.16);
      border: 1px solid rgba(255, 173, 77, 0.36);
    }

    .status.gave-up {
      color: #dce4ed;
      background: rgba(125, 141, 163, 0.18);
      border: 1px solid rgba(125, 141, 163, 0.32);
    }

    .timer {
      font-variant-numeric: tabular-nums;
      font-size: clamp(1.2rem, 2.2vw, 1.85rem);
      font-weight: 950;
      letter-spacing: 0;
    }

    .timer.hidden-time {
      color: var(--muted);
      font-size: 1rem;
      white-space: normal;
    }

    .break-time {
      margin-top: 5px;
      color: var(--muted);
      font-size: 0.8rem;
      font-weight: 800;
    }

    .card-actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px;
      min-width: 220px;
    }

    .leaderboard.is-scrollable {
      max-height: min(68vh, 720px);
      overflow-y: auto;
      padding-right: 6px;
      scrollbar-color: rgba(88, 216, 255, 0.45) rgba(255, 255, 255, 0.05);
    }

    .empty-state {
      border: 1px dashed rgba(196, 223, 255, 0.24);
      border-radius: 8px;
      padding: 28px;
      color: var(--muted);
      text-align: center;
      background: rgba(13, 27, 47, 0.45);
    }

    @media (max-width: 980px) {
      .topbar,
      .control-bar {
        grid-template-columns: 1fr;
      }

      .participant-card {
        grid-template-columns: 48px 1fr;
      }

      .participant-meta,
      .status-wrap,
      .timer-wrap,
      .card-actions {
        grid-column: 2;
      }

      .card-actions {
        justify-content: flex-start;
      }
    }

    @media (max-width: 620px) {
      .app {
        width: min(100% - 20px, 1280px);
        padding-top: 10px;
      }

      .hero {
        min-height: 310px;
        padding: 20px;
      }

      .add-form {
        grid-template-columns: 1fr;
      }

      .participant-card {
        grid-template-columns: 1fr;
      }

      .participant-meta,
      .status-wrap,
      .timer-wrap,
      .card-actions {
        grid-column: 1;
      }

      .rank {
        width: 100%;
      }

      .card-actions button {
        flex: 1 1 120px;
      }

      .leaderboard-title {
        align-items: start;
        flex-direction: column;
      }

      .leaderboard-controls,
      .card-actions {
        justify-content: stretch;
        width: 100%;
      }

      .leaderboard-controls button,
      .leaderboard-controls input,
      .card-actions button {
        flex: 1 1 120px;
      }
    }
  </style>
</head>
<body>
  <section id="authScreen" class="auth-screen">
    <div class="auth-card">
      <p class="kicker">Manager Login</p>
      <h1>The Last Man Standing</h1>
      <form id="loginForm" class="auth-form">
        <input id="loginEmail" type="email" autocomplete="email" placeholder="Email address" required />
        <input id="loginPassword" type="password" autocomplete="current-password" placeholder="Password" required />
        <button class="primary-button" type="submit">Sign In</button>
      </form>
      <p id="loginState" class="auth-state" role="status"></p>
    </div>
  </section>

  <main id="appShell" class="app is-hidden">
    <section class="topbar">
      <section class="cover-panel">
        <button id="coverToggleBtn" class="ghost-button cover-toggle" type="button">Show Cover</button>
        <div id="coverHero" class="hero is-hidden">
          <p class="kicker">Villa Bravado</p>
          <h1>The Last Man Standing</h1>
        </div>
      </section>

      <section class="control-bar" aria-label="Controls">
        <details class="control-menu">
          <summary>Add Participant</summary>
          <div class="control-content">
            <form id="addForm" class="add-form">
              <input id="participantName" type="text" autocomplete="off" placeholder="Student number or unique name" required />
              <button class="primary-button" type="submit">Add</button>

        </details>

        <details class="control-menu">
          <summary>Manager Controls</summary>
          <div class="control-content">
            <button id="refreshBtn" class="primary-button" type="button">Refresh</button>
            <button id="hideTimesBtn" class="ghost-button" type="button">Hide Times</button>
            <button id="signOutBtn" class="ghost-button" type="button">Sign Out</button>
            <div id="syncState" class="sync-state" role="status">Signed in.</div>
          </div>
        </details>
      </section>
    </section>

    <header class="leaderboard-title">

    <section id="leaderboard" class="leaderboard" aria-label="Leaderboard"></section>

    function installMoonCursor() {
      const style = document.createElement("style");
      style.textContent = `
        body, button, input {
          cursor: none;
        }

        .moon-cursor {
          position: fixed;
          left: 0;
          top: 0;
          width: 28px;
          height: 28px;
          border: 2px solid rgba(216, 247, 255, 0.92);
          border-radius: 50%;
          pointer-events: none;
          z-index: 9999;
          transform: translate(-50%, -50%);
          box-shadow: 0 0 18px rgba(88, 216, 255, 0.48), inset -7px 0 0 rgba(88, 216, 255, 0.18);
          transition: width 120ms ease, height 120ms ease, border-color 120ms ease, opacity 120ms ease;
        }

        .moon-cursor::after {
          content: "";
          position: absolute;
          width: 12px;
          height: 12px;
          right: 3px;
          top: 4px;
          border-radius: 50%;
          background: rgba(7, 17, 31, 0.9);
          box-shadow: -2px 2px 8px rgba(7, 17, 31, 0.7);
        }

        .moon-cursor.is-active {
          width: 36px;
          height: 36px;
          border-color: rgba(56, 217, 134, 0.96);
        }
      `;

      const cursor = document.createElement("div");
      cursor.className = "moon-cursor";
      document.head.appendChild(style);
      document.body.appendChild(cursor);

      window.addEventListener("mousemove", (event) => {
        cursor.style.left = `${event.clientX}px`;
        cursor.style.top = `${event.clientY}px`;
        cursor.style.opacity = "1";
      });

      window.addEventListener("mousedown", () => cursor.classList.add("is-active"));
      window.addEventListener("mouseup", () => cursor.classList.remove("is-active"));
      window.addEventListener("mouseleave", () => {
        cursor.style.opacity = "0";
      });
    }

    function nowIso() {
      return new Date().toISOString();
    }

    function createId() {
      if (crypto.randomUUID) return crypto.randomUUID();
      return `id-${Date.now()}-${Math.random().toString(16).slice(2)}`;
    }

    function normalizeName(value) {
      return value.trim().replace(/\s+/g, " ");
    }

    function loadSettings() {
      try {
        const settings = JSON.parse(localStorage.getItem(SETTINGS_KEY)) || {};
        state.hideTimes = Boolean(settings.hideTimes);
      } catch {
        state.hideTimes = false;
      }
    }

    function saveSettings() {
      localStorage.setItem(SETTINGS_KEY, JSON.stringify({ hideTimes: state.hideTimes }));
    }

    function loadLocalParticipants() {
      try {
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
        state.participants = Array.isArray(saved) ? saved.map(cleanParticipant) : [];
      } catch {
        state.participants = [];
      }
    }

    function saveLocalParticipants() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state.participants));

    function cleanParticipant(participant) {
      return {
        id: participant.id || createId(),
        participant_name: participant.participant_name || participant.name || "Unknown Participant",
        code: participant.code || generateUniqueCode(),
        secret_code: participant.secret_code || generateUniqueSecretCode(),
        status: participant.status || "Studying",
        study_seconds: Number(participant.study_seconds || 0),
        active_since: participant.active_since || (participant.status === "Studying" ? nowIso() : null),
        created_at: participant.created_at || nowIso(),
        updated_at: participant.updated_at || nowIso()
      };
    }

    function generateUniqueCode() {
      const existingCodes = new Set(state.participants.map((participant) => participant.code));
      let code = "";
      let attempts = 0;

      do {
        const adjective = aliasAdjectives[Math.floor(Math.random() * aliasAdjectives.length)];
        const noun = aliasNouns[Math.floor(Math.random() * aliasNouns.length)];
        const number = Math.floor(1000 + Math.random() * 9000);
        code = `${adjective} ${noun} ${number}`;
        attempts += 1;
      } while (existingCodes.has(code) && attempts < 100);

      if (existingCodes.has(code)) {
        code = `Last Standing ${Date.now().toString().slice(-6)}`;
      }

      return code;
    }

    function generateUniqueSecretCode() {
      const existingCodes = new Set(state.participants.map((participant) => String(participant.secret_code || "")));
      let secretCode = "";

      do {
        secretCode = String(Math.floor(10000 + Math.random() * 90000));
      } while (existingCodes.has(secretCode));

      return secretCode;
    }

    function getStudySeconds(participant, at = Date.now()) {
      const storedSeconds = Number(participant.study_seconds || 0);

      if (participant.status !== "Studying" || !participant.active_since) {
        return storedSeconds;
      }

      const activeStarted = new Date(participant.active_since).getTime();
      if (Number.isNaN(activeStarted)) return storedSeconds;

      return storedSeconds + Math.max(0, Math.floor((at - activeStarted) / 1000));
    }

    function freezeParticipantTimer(participant) {
      participant.study_seconds = getStudySeconds(participant);
      participant.active_since = null;
      participant.updated_at = nowIso();
    }

    function toSupabaseParticipant(participant) {
      return {
        id: participant.id,
        participant_name: participant.participant_name,
        code: participant.code,
        secret_code: participant.secret_code,
        status: participant.status,
        study_seconds: participant.study_seconds,
        active_since: participant.active_since,
        created_at: participant.created_at,
        updated_at: participant.updated_at
      };
    }

    function formatTime(totalSeconds) {
      const seconds = Math.max(0, Math.floor(totalSeconds));
      const hours = Math.floor(seconds / 3600);
      const minutes = Math.floor((seconds % 3600) / 60);
      const remainingSeconds = seconds % 60;
      return [hours, minutes, remainingSeconds]
        .map((part) => String(part).padStart(2, "0"))
        .join(":");
    }

    function sortedParticipants() {
      const at = Date.now();
      return [...state.participants].sort((a, b) => {
        const timeDifference = getStudySeconds(b, at) - getStudySeconds(a, at);
        if (timeDifference !== 0) return timeDifference;
        return a.participant_name.localeCompare(b.participant_name);
      });
    }

    function statusClass(status) {
      if (status === "Studying") return "studying";
      if (status === "On Break") return "break";
      return "gave-up";
    }

    function getRankMove(participant, rank) {
      if (!participant.previous_rank) {
        return { className: "", text: "new" };
      }

      const difference = participant.previous_rank - rank;
      if (difference > 0) return { className: "up", text: `up ${difference}` };
      if (difference < 0) return { className: "down", text: `down ${Math.abs(difference)}` };
      return { className: "", text: "same" };
    }

    function updatePreviousRanks(sorted) {
      state.participants.forEach((participant) => {
        const rankIndex = sorted.findIndex((ranked) => ranked.id === participant.id);
        if (rankIndex >= 0) {
          participant.previous_rank = rankIndex + 1;
        }
      });
    }

    function captureCurrentRanks() {
      updatePreviousRanks(sortedParticipants());
      saveLocalParticipants();
    }

    function getMilestoneBadges(participant, seconds) {
      const badges = [];

      if (participant.status === "Gave Up") {
        badges.push("Fallen");
      } else if (participant.status === "On Break") {
        badges.push("Breather");
      } else {
        badges.push("Still Standing");
      }

      if (seconds >= 3600) badges.push("1 Hour Club");
      if (seconds >= 3 * 3600) badges.push("3 Hour Beast");
      if (seconds >= 6 * 3600) badges.push("Deep Work Legend");

      return badges.slice(0, 3);
    }

    function render() {
      const searchTerm = normalizeName(elements.participantSearch.value).toLowerCase();
      const sorted = sortedParticipants();
      const filtered = searchTerm
        ? sorted.filter((participant) =>
            participant.code.toLowerCase().includes(searchTerm) ||
            participant.participant_name.toLowerCase().includes(searchTerm)
          )
        : sorted;
      const participants = state.showAllParticipants || searchTerm ? filtered : filtered.slice(0, 10);
      const at = Date.now();

      elements.coverHero.classList.toggle("is-hidden", !state.showCover);
      elements.coverToggleBtn.textContent = state.showCover ? "Hide Cover" : "Show Cover";
      elements.leaderboard.classList.toggle("is-scrollable", state.showAllParticipants || Boolean(searchTerm));
      elements.leaderboardModeLabel.textContent = searchTerm
        ? `Matches (${filtered.length})`
        : state.showAllParticipants
          ? `Everyone (${sorted.length})`
          : "Current Top 10";
      elements.toggleLeaderboardBtn.textContent = state.showAllParticipants ? "Show Top 10" : "Show Everyone";
      elements.hideTimesBtn.textContent = state.hideTimes ? "Show Times" : "Hide Times";

      if (!participants.length) {
        elements.leaderboard.innerHTML = searchTerm
          ? '<div class="empty-state">No matching participant.</div>'
          : '<div class="empty-state">Add the first participant.</div>';
        return;
      }

      elements.leaderboard.innerHTML = participants.map((participant, index) => {
        const seconds = getStudySeconds(participant, at);
        const timeText = state.hideTimes ? "Hidden by manager" : formatTime(seconds);
        const breakVisible = participant.status === "Studying";
        const resumeVisible = participant.status === "On Break";
        const locked = participant.status === "Gave Up";
        const rank = index + 1;
        const rankMove = getRankMove(participant, rank);
        const badges = getMilestoneBadges(participant, seconds)
          .map((badge) => `<span class="milestone-badge">${escapeHtml(badge)}</span>`)
          .join("");

        return `
          <article class="participant-card" data-id="${participant.id}">
            <div>
              <div class="rank">#${rank}</div>
              <div class="rank-move ${rankMove.className}">${rankMove.text}</div>
            </div>
            <div class="participant-meta">
              <h3 class="participant-name">${escapeHtml(participant.code)}</h3>
              <div class="badge-row">${badges}</div>
            </div>
            <div class="status-wrap">
              <span class="status ${statusClass(participant.status)}">${escapeHtml(participant.status)}</span>
            </div>
            <div class="timer-wrap">
              <div class="timer ${state.hideTimes ? "hidden-time" : ""}">${timeText}</div>
            </div>
            <div class="card-actions">
              ${breakVisible ? '<button class="warm-button" data-action="break" type="button">Break</button>' : ""}
              ${resumeVisible ? '<button class="primary-button" data-action="resume" type="button">Resume</button>' : ""}
              <button class="danger-button" data-action="give-up" type="button" ${locked ? "disabled" : ""}>Give Up</button>
            </div>
          </article>
        `;
      }).join("");

    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    async function addParticipant(participantName) {
      const normalized = normalizeName(participantName);
      const duplicate = state.participants.some(
        (participant) => participant.participant_name.toLowerCase() === normalized.toLowerCase()
      );

      if (duplicate) {
        alert("That participant name or student number already exists.");
        return;
      }

      const participant = {
        id: createId(),
        participant_name: normalized,
        code: generateUniqueCode(),
        secret_code: generateUniqueSecretCode(),
        status: "Studying",
        study_seconds: 0,
        active_since: null,
        created_at: nowIso(),
        updated_at: nowIso()
      };

      alert(`Give this code to ${participant.code}: ${participant.secret_code}`);
      participant.active_since = nowIso();
      participant.updated_at = nowIso();
      state.participants.push(participant);
      saveLocalParticipants();
      render();
      await upsertParticipant(participant);
    }

    function findParticipantFromEvent(event) {
      const card = event.target.closest(".participant-card");
      if (!card) return null;
      return state.participants.find((participant) => participant.id === card.dataset.id);
    }

    function confirmParticipantCode(participant, actionText) {
      const enteredCode = prompt(`Enter the 5-digit code for ${participant.code} to ${actionText}.`);
      if (enteredCode === null) return false;
      if (enteredCode.trim() !== String(participant.secret_code)) {
        alert("That code does not match.");
        return false;
      }

      return true;
    }

    function handleParticipantAction(event) {
      const button = event.target.closest("button[data-action]");
      if (!button) return;

      const participant = findParticipantFromEvent(event);
      if (!participant || participant.status === "Gave Up") return;

      captureCurrentRanks();

      if (button.dataset.action === "break") {
        if (!confirmParticipantCode(participant, "pause the timer")) return;
        freezeParticipantTimer(participant);
        participant.status = "On Break";
      }

      if (button.dataset.action === "resume") {
        participant.status = "Studying";
        participant.active_since = nowIso();
        participant.updated_at = nowIso();
      }

      if (button.dataset.action === "give-up") {
        if (!confirmParticipantCode(participant, "give up")) return;
        const confirmed = confirm("Are you absolutely sure you want to Give Up? This cannot be undone.");
        if (!confirmed) return;
        if (participant.status === "Studying") {
          freezeParticipantTimer(participant);
        } else {
          participant.active_since = null;
        }
        participant.status = "Gave Up";
      }

      participant.updated_at = nowIso();
      saveLocalParticipants();
      render();
      syncParticipantAction(participant);
    }

    async function syncParticipantAction(participant) {
      await upsertParticipant(participant);

      if (!supabaseClient) return;

      const remoteParticipants = await fetchRemoteParticipants();
      state.participants = mergeParticipants(state.participants, remoteParticipants);
      saveLocalParticipants();
      render();
    }

    async function upsertParticipant(participant) {
      if (!supabaseClient) {
        setSyncState("Saved locally. Supabase is not configured.");
        return;
      }

      try {
        setSyncState("Syncing participant...");
        const { error } = await supabaseClient
          .from(TABLE_NAME)
          .upsert(toSupabaseParticipant(participant), { onConflict: "id" });

        if (error) throw error;
        setSyncState(`Synced ${participant.participant_name}.`);
      } catch (error) {
        console.error(error);
        setSyncState(`Supabase sync failed: ${error.message}`);
      }
    }

    async function fetchRemoteParticipants() {
      if (!supabaseClient) return [];

      const { data, error } = await supabaseClient
        .from(TABLE_NAME)
        .select("*")
        .order("study_seconds", { ascending: false });

      if (error) throw error;
      return Array.isArray(data) ? data.map(cleanParticipant) : [];
    }

    async function verifyManagerAccess() {
      const { data: userData, error: userError } = await supabaseClient.auth.getUser();
      if (userError) throw userError;
      if (!userData.user) throw new Error("Please sign in again.");

      const { data, error } = await supabaseClient
        .from(MANAGERS_TABLE_NAME)
        .select("user_id")
        .eq("user_id", userData.user.id)
        .maybeSingle();

      if (error) throw error;
      if (!data) throw new Error("This account is not approved as a manager.");
    }

    function mergeParticipants(localParticipants, remoteParticipants) {
      const mergedById = new Map();

      [...remoteParticipants, ...localParticipants].forEach((participant) => {
        const existing = mergedById.get(participant.id);
        if (!existing) {
          mergedById.set(participant.id, participant);
          return;
        }

        const existingUpdated = new Date(existing.updated_at || 0).getTime();
        const nextUpdated = new Date(participant.updated_at || 0).getTime();

        if (existing.status === "Gave Up" || participant.status === "Gave Up") {
          mergedById.set(participant.id, existing.status === "Gave Up" ? existing : participant);
          return;
        }

        mergedById.set(participant.id, nextUpdated >= existingUpdated ? participant : existing);
      });

      return [...mergedById.values()];
    }

    async function refreshLeaderboard() {
      if (state.syncing) return;
      state.syncing = true;
      elements.refreshBtn.disabled = true;

      try {
        setSyncState("Refreshing leaderboard...");
        captureCurrentRanks();

        if (supabaseClient) {
          const remoteParticipants = await fetchRemoteParticipants();
          state.participants = mergeParticipants(state.participants, remoteParticipants);
          saveLocalParticipants();
          setSyncState(`Leaderboard refreshed at ${new Date().toLocaleTimeString()}.`);
        } else {
          setSyncState("Leaderboard refreshed locally. Supabase credentials are not configured yet.");
        }

        render();
      } catch (error) {
        console.error(error);
        setSyncState(`Refresh failed: ${error.message}`);
      } finally {
        state.syncing = false;
        elements.refreshBtn.disabled = false;
      }
    }

    function setSyncState(message) {
      elements.syncState.textContent = message;
    }

    async function unlockApp() {
      await verifyManagerAccess();
      showApp();
      loadSettings();
      loadLocalParticipants();
      render();

      if (!state.renderTimer) {
        state.renderTimer = setInterval(render, 1000);
      }

      await refreshLeaderboard();
    }

    elements.form.addEventListener("submit", async (event) => {
      event.preventDefault();
      const participantName = normalizeName(elements.nameInput.value);
      if (!participantName) return;

      elements.nameInput.value = "";
      await addParticipant(participantName);
    });

    elements.leaderboard.addEventListener("click", handleParticipantAction);

    elements.refreshBtn.addEventListener("click", refreshLeaderboard);

    elements.hideTimesBtn.addEventListener("click", () => {
      state.hideTimes = !state.hideTimes;
      saveSettings();
      render();
    });

    elements.coverToggleBtn.addEventListener("click", () => {
      state.showCover = !state.showCover;
      render();
    });

    elements.toggleLeaderboardBtn.addEventListener("click", () => {
      state.showAllParticipants = !state.showAllParticipants;
      render();
    });

    elements.participantSearch.addEventListener("input", render);

    elements.loginForm.addEventListener("submit", async (event) => {
      event.preventDefault();

      if (!supabaseClient) {
        setLoginState("Add your Supabase URL and anon key before signing in.");
        return;
      }

      const email = elements.loginEmail.value.trim();
      const password = elements.loginPassword.value;

      try {
        setLoginState("Signing in...");
        const { error } = await supabaseClient.auth.signInWithPassword({
          email,
          password
        });

        if (error) throw error;
        elements.loginPassword.value = "";
        setLoginState("");
        await unlockApp();
      } catch (error) {
        console.error(error);
        await supabaseClient.auth.signOut();
        showLogin();
        setLoginState(`Sign in failed: ${error.message}`);
      }
    });

    elements.signOutBtn.addEventListener("click", async () => {
      if (supabaseClient) {
        await supabaseClient.auth.signOut();
      }

      state.participants = [];
      if (state.renderTimer) {
        clearInterval(state.renderTimer);
        state.renderTimer = null;
      }

      showLogin();
      setLoginState("Signed out.");
    });

    window.addEventListener("beforeunload", () => {
      saveLocalParticipants();
      saveSettings();
    });

    async function initializeApp() {
      installMoonCursor();
      showLogin();

      if (!supabaseClient) {
        setLoginState("Add your Supabase URL and anon key in this file first.");
        return;
      }

      const { data } = await supabaseClient.auth.getSession();
      if (data.session) {
        try {
          await unlockApp();
        } catch (error) {
          console.error(error);
          await supabaseClient.auth.signOut();
          showLogin();
          setLoginState(error.message);
        }
      }
    }

    initializeApp();
  </script>
</body>
</html>

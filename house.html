
<!DOCTYPE html>
<html>
<head>
  <title>Villa Bravado Study Day</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>

<div class="vb-wrap">
  <div class="vb-card">
    <div class="vb-header">
      <div class="vb-badge">VB</div>
      <div>
        <h1>Villa Bravado</h1>
        <p>Study Day Register</p>
      </div>
    </div>

    <form class="vb-form" id="attendanceForm">

      <fieldset class="vb-fieldset">
        <legend>Cub or Senior</legend>
        <label class="vb-radio"><input type="radio" name="status" value="Cub" required> <span>Cub</span></label>
        <label class="vb-radio"><input type="radio" name="status" value="Senior" required> <span>Senior</span></label>
      </fieldset>

      <label>Full Name</label>
      <input type="text" name="full_name" required>

      <label>Room Number</label>
      <input type="text" name="room_number" required>

      <label>Student Number</label>
      <input type="text" name="student_number" maxlength="10" minlength="10" required>

      <label>Meeting PIN</label>
      <input type="password" name="meeting_pin" maxlength="6" required>

      <button type="submit" id="submitBtn" class="vb-button" disabled>
        <span class="vb-btn-text">Submit Attendance</span>
      </button>

      <div id="successMsg" class="vb-toast" role="status" aria-live="polite"></div>

    </form>
  </div>
</div>

<!-- Incorrect PIN Popup -->
<div class="vb-modal" id="pinModal" aria-hidden="true">
  <div class="vb-modal-card" role="alertdialog" aria-labelledby="pinTitle" aria-describedby="pinDesc">
    <h3 id="pinTitle">Incorrect PIN</h3>
    <p id="pinDesc">The Meeting PIN you entered is not correct. Please try again.</p>
    <button type="button" class="vb-button vb-button--ghost" id="pinModalClose">
      <span class="vb-btn-text">Close</span>
    </button>
  </div>
</div>

<style>
:root{
  --bg:#0a0a0d;
  --bg-2:#0f0f15;
  --gold:#d6b25e;
  --gold-soft:#f0d889;
  --text:#f2f2f2;
  --muted:#b6b6b6;
  --card:#111218;
  --line:rgba(214,178,94,0.35);
  --shadow:0 24px 60px rgba(0,0,0,0.55);
}

*{ box-sizing:border-box; }
body{
  margin:0;
  background:
    radial-gradient(1200px 600px at 10% -10%, rgba(214,178,94,0.08), transparent 60%),
    radial-gradient(1200px 600px at 100% 0%, rgba(214,178,94,0.06), transparent 60%),
    var(--bg);
  color:var(--text);
  font-family:"Source Sans 3", Arial, sans-serif;
  padding:24px;
}

.vb-wrap{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
}

.vb-card{
  width:100%;
  max-width:720px;
  background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0)) , var(--card);
  border:1px solid var(--line);
  border-radius:16px;
  padding:28px;
  box-shadow:var(--shadow);
  transform-style:preserve-3d;
  animation:flipIn 800ms ease;
}

@keyframes flipIn{
  0%{ transform:perspective(1200px) rotateX(12deg) rotateY(-12deg) scale(0.98); opacity:0; }
  100%{ transform:perspective(1200px) rotateX(0deg) rotateY(0deg) scale(1); opacity:1; }
}

.vb-card:hover{
  transform:perspective(1200px) rotateX(1deg) rotateY(-1deg);
  transition:transform 300ms ease;
}

.vb-card.is-submitting{
  transform-origin:bottom center;
  animation:submitFlip360 1000ms ease-in-out;
}

.vb-card.is-submitting:hover{
  transform:none;
}

@keyframes submitFlip360{
  0%{ transform:perspective(1200px) rotateX(0deg); }
  50%{ transform:perspective(1200px) rotateX(-180deg); }
  100%{ transform:perspective(1200px) rotateX(-360deg); }
}

.vb-header{
  display:flex;
  align-items:center;
  gap:14px;
  margin-bottom:18px;
}

.vb-header h1{
  margin:0;
  font-family:"Cinzel", serif;
  font-weight:600;
  letter-spacing:1px;
  font-size:26px;
}

.vb-header p{
  margin:4px 0 0;
  color:var(--muted);
  font-size:14px;
  letter-spacing:1px;
  text-transform:uppercase;
}

.vb-badge{
  width:48px;
  height:48px;
  border-radius:50%;
  display:grid;
  place-items:center;
  font-family:"Cinzel", serif;
  font-weight:600;
  letter-spacing:1px;
  background:linear-gradient(145deg, #f3d07a, #b58b39);
  color:#111;
  box-shadow:0 10px 24px rgba(214,178,94,0.35);
}

.vb-form{
  display:grid;
  gap:12px;
}

label{
  font-size:14px;
  color:var(--gold-soft);
  margin-top:6px;
}

input[type="text"],
input[type="password"]{
  width:100%;
  padding:12px 14px;
  background:var(--bg-2);
  border:1px solid rgba(255,255,255,0.08);
  color:var(--text);
  border-radius:10px;
  outline:none;
  transition:border 200ms ease, box-shadow 200ms ease;
}

input:focus{
  border-color:var(--gold);
  box-shadow:0 0 0 3px rgba(214,178,94,0.2);
}

.vb-fieldset{
  border:1px solid rgba(255,255,255,0.08);
  border-radius:12px;
  padding:12px;
  display:flex;
  gap:16px;
  flex-wrap:wrap;
}

.vb-fieldset legend{
  padding:0 8px;
  color:var(--gold-soft);
  font-size:13px;
  letter-spacing:0.5px;
}

.vb-radio{
  display:flex;
  align-items:center;
  gap:8px;
  font-size:14px;
}

.vb-radio input{
  accent-color:var(--gold);
}

.vb-button{
  margin-top:6px;
  padding:12px 22px;
  background:linear-gradient(140deg, #f3d07a, #b58b39);
  color:#111;
  font-weight:700;
  border:none;
  border-radius:10px;
  cursor:pointer;
  letter-spacing:0.6px;
  text-transform:uppercase;
  position:relative;
  overflow:hidden;
  transition:transform 120ms ease, box-shadow 200ms ease, opacity 200ms ease;
  box-shadow:0 10px 20px rgba(214,178,94,0.25);
  width:auto;
  justify-self:start;
  align-self:start;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  touch-action:manipulation;
}

.vb-button::after{
  content:"";
  position:absolute;
  inset:-40% auto auto -60%;
  width:60%;
  height:200%;
  transform:rotate(20deg);
  background:linear-gradient(90deg, transparent, rgba(255,255,255,0.35), transparent);
  transition:transform 500ms ease;
}

.vb-button:hover::after{
  transform:translateX(220%) rotate(20deg);
}

.vb-button:hover{ transform:translateY(-1px); }
.vb-button:active{ transform:translateY(0); }

.vb-button:disabled{
  opacity:0.55;
  cursor:not-allowed;
  box-shadow:none;
  filter:saturate(0.7);
}

.vb-button.is-loading{
  pointer-events:none;
}

.vb-button--ghost{
  background:transparent;
  color:var(--gold);
  border:1px solid var(--gold);
  box-shadow:none;
}

.vb-toast{
  display:none;
  margin-top:10px;
  padding:12px;
  border-radius:10px;
  color:#f7e7ba;
  border:1px solid rgba(214,178,94,0.35);
  background:rgba(214,178,94,0.12);
}

.vb-toast--error{
  color:#ffd6d6;
  border:1px solid rgba(214,178,94,0.35);
  background:rgba(255, 90, 90, 0.08);
}

.vb-toast.show{
  display:block;
  animation:fadeSlide 300ms ease;
}

.vb-code{
  display:inline-block;
  margin-left:6px;
  padding:2px 8px;
  border-radius:999px;
  border:1px solid rgba(214,178,94,0.5);
  font-family:"Cinzel", serif;
  letter-spacing:1px;
  color:#111;
  background:linear-gradient(145deg, #f3d07a, #b58b39);
}

.vb-quote{
  display:block;
  margin-top:6px;
  color:var(--gold-soft);
  font-style:italic;
}

@keyframes fadeSlide{
  from{ opacity:0; transform:translateY(6px); }
  to{ opacity:1; transform:translateY(0); }
}

/* Modal */
.vb-modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.7);
  display:none;
  align-items:center;
  justify-content:center;
  padding:20px;
  z-index:50;
}

.vb-modal.is-open{ display:flex; }

.vb-modal-card{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:14px;
  padding:20px;
  max-width:420px;
  width:100%;
  box-shadow:var(--shadow);
}

.vb-modal-card h3{
  margin:0 0 8px;
  color:var(--gold-soft);
}

.vb-modal-card p{
  margin:0 0 14px;
  color:var(--text);
}

/* Responsive */
@media (max-width: 620px){
  body{ padding:16px; }
  .vb-card{ padding:20px; }
  .vb-header{ flex-direction:column; align-items:flex-start; }
}
</style>

<script>
const button = document.getElementById("submitBtn");
const successMsg = document.getElementById("successMsg");
const form = document.getElementById("attendanceForm");
const card = document.querySelector(".vb-card");
const btnText = document.querySelector(".vb-btn-text");

const pinModal = document.getElementById("pinModal");
const pinModalClose = document.getElementById("pinModalClose");

let isSubmitting = false;

function checkForm() {
  button.disabled = isSubmitting || !form.checkValidity();
}
form.addEventListener("input", checkForm);
form.addEventListener("change", checkForm);
form.addEventListener("keyup", checkForm);
form.addEventListener("blur", checkForm, true);
checkForm();

function triggerSubmitFlip(){
  card.classList.remove("is-submitting");
  void card.offsetWidth;
  card.classList.add("is-submitting");
}

function setSubmitting(state){
  isSubmitting = state;
  if (state) {
    button.classList.add("is-loading");
    btnText.textContent = "Submitting...";
  } else {
    button.classList.remove("is-loading");
    btnText.textContent = "Submit Attendance";
  }
  checkForm();
}

function showMessage(type, html){
  successMsg.classList.remove("show", "vb-toast--error");
  if (type === "error") successMsg.classList.add("vb-toast--error");
  successMsg.innerHTML = html;
  successMsg.classList.add("show");
}

function showPinError(){
  pinModal.classList.add("is-open");
  pinModal.setAttribute("aria-hidden", "false");
}

function hidePinError(){
  pinModal.classList.remove("is-open");
  pinModal.setAttribute("aria-hidden", "true");
}

pinModalClose.addEventListener("click", hidePinError);
pinModal.addEventListener("click", (e) => {
  if (e.target === pinModal) hidePinError();
});
document.addEventListener("keydown", (e) => {
  if (e.key === "Escape") hidePinError();
});

const studyCodes = [
  { code: "VB-GOLD-710", message: "Small steps daily become mastery." },
  { code: "FOCUS-LOCK-9", message: "Protect your study time like treasure." },
  { code: "BRAVADO-ARC-21", message: "Consistency beats intensity, every time." },
  { code: "DISCIPLINE-8", message: "Show up today, thank yourself tomorrow." }
];

// Supabase (UNCHANGED)
const supabaseUrl = 'https://hldtrofwejpxixtbrthz.supabase.co';
const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhsZHRyb2Z3ZWpweGl4dGJydGh6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1OTUxMTQsImV4cCI6MjA4OTE3MTExNH0.N5DsYTVezE_DL5fBGdobyIdTlauklJgB7UeTsNybDv8';
const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  successMsg.classList.remove('show', 'vb-toast--error');

  triggerSubmitFlip();
  setSubmitting(true);

  const enteredPin = form.meeting_pin.value.trim();

  try {
    // GET FIRST ROW PIN
    const { data, error } = await supabaseClient
      .from('attendanceMeeting')
      .select('meeting_pin')
      .order('id', { ascending: true })
      .limit(1)
      .single();

    if (error) throw error;

    const correctPin = data.meeting_pin;

    // CHECK PIN
    if (enteredPin !== correctPin) {
      showPinError();
      setSubmitting(false);
      return;
    }

    // INSERT WITHOUT PIN
    const dataToInsert = {
      status: form.status.value,
      full_name: form.full_name.value.trim(),
      room_number: form.room_number.value.trim(),
      student_number: form.student_number.value.trim()
    };

    const { error: insertError } = await supabaseClient
      .from('attendanceMeeting')
      .insert([dataToInsert]);

    if (insertError) {
      const msg = (insertError.message || "").toLowerCase();
      if (msg.includes("duplicate") || msg.includes("unique")) {
        showMessage("error",
          "<strong>Already recorded.</strong> This student number has already submitted attendance. Thank you for being punctual.");
        setSubmitting(false);
        return;
      }
      throw insertError;
    }

    const pick = studyCodes[Math.floor(Math.random() * studyCodes.length)];
    showMessage("success", `
      <strong>Thank you.</strong> Attendance received.
      <span class="vb-code">Study Code: ${pick.code}</span>
      <span class="vb-quote">${pick.message}</span>
    `);

    form.reset();
    setSubmitting(false);

    setTimeout(() => {
      successMsg.classList.remove('show');
    }, 6000);

  } catch (err) {
    console.error(err);
    showMessage("error", "Something went wrong while submitting. Please try again.");
    setSubmitting(false);
  }
});
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <title>Villa Bravado House Meeting</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>

<body>

<div class="vb-wrap">
  <div class="vb-card">
    <div class="vb-header">
      <div class="vb-badge">VB</div>
      <div>
        <h1>Villa Bravado</h1>
        <p>House Meeting Attendance Register</p>
      </div>
    </div>

    <form class="vb-form" id="attendanceForm">

      <fieldset class="vb-fieldset">
        <legend>Cub or Senior</legend>
        <label><input type="radio" name="status" value="Cub" required> Cub</label>
        <label><input type="radio" name="status" value="Senior" required> Senior</label>
      </fieldset>

      <label>Full Name</label>
      <input type="text" name="full_name" required>

      <label>Room Number</label>
      <input type="text" name="room_number" required>

      <label>Student Number</label>
      <input type="text" name="student_number" maxlength="10" minlength="10" required>

      <label>Meeting PIN</label>
      <input type="password" name="meeting_pin" maxlength="6" required>

      <button type="submit" id="submitBtn" class="vb-button" disabled>Submit Attendance</button>

      <p id="successMsg" style="color: lightgreen; display:none;">Attendance submitted successfully!</p>

    </form>
  </div>
</div>

<style>
body{ background:#0c0c0f; color:white; font-family:Arial; padding:20px; }
.vb-card{ max-width:640px; margin:auto; padding:25px; border:1px solid gold; border-radius:12px; }
.vb-form{ display:grid; gap:10px; }
.vb-button{ padding:12px; background:gold; border:none; cursor:pointer; }
.vb-button:disabled{ opacity:0.5; }
</style>

<script>
const button = document.getElementById("submitBtn");
const successMsg = document.getElementById("successMsg");
const form = document.getElementById("attendanceForm");

function checkForm() {
  button.disabled = !form.checkValidity();
}
form.addEventListener("input", checkForm);
form.addEventListener("change", checkForm);
checkForm();

// Supabase
const supabaseUrl = 'https://hldtrofwejpxixtbrthz.supabase.co';
const supabaseKey = 'YOUR_ANON_KEY';
const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

form.addEventListener('submit', async (e) => {
  e.preventDefault();

  const enteredPin = form.meeting_pin.value.trim();

  try {
    // 🔍 STEP 1: GET FIRST ROW (PIN SOURCE)
    const { data, error } = await supabaseClient
      .from('attendanceMeeting')
      .select('meeting_pin')
      .order('id', { ascending: true }) // first row
      .limit(1)
      .single();

    if (error) throw error;

    const correctPin = data.meeting_pin;

    // ❌ STEP 2: VALIDATE PIN
    if (enteredPin !== correctPin) {
      alert("Invalid Meeting PIN");
      return;
    }

    // ✅ STEP 3: INSERT NEW ATTENDANCE (NO PIN)
    const dataToInsert = {
      status: form.status.value,
      full_name: form.full_name.value.trim(),
      room_number: form.room_number.value.trim(),
      student_number: form.student_number.value.trim()
    };

    const { error: insertError } = await supabaseClient
      .from('attendanceMeeting')
      .insert([dataToInsert]);

    if (insertError) throw insertError;

    successMsg.style.display = 'block';
    form.reset();
    button.disabled = true;

    setTimeout(() => {
      successMsg.style.display = 'none';
    }, 3000);

  } catch (err) {
    console.error(err);
    alert('Error: ' + err.message);
  }
});
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <title>Villa Bravado Home</title>
  <style>
    body { background:#0c0c0f; color:white; font-family:Arial; padding:20px; }
    .vb-card { max-width:640px; margin:auto; padding:25px; border:1px solid gold; border-radius:12px; }
    .tabs { display:flex; gap:10px; margin-bottom:20px; }
    .tab-button { padding:10px 20px; cursor:pointer; background:#222; border:none; color:white; border-radius:5px; text-decoration:none; }
    .tab-button.active { background:gold; color:black; }
    .vb-tab-content { display:none; }
    .vb-tab-content.active { display:block; }
  </style>
</head>
<body>

<div class="vb-wrap">
  <div class="vb-card">
    <h1>Villa Bravado</h1>
    <p>Welcome to the home page!</p>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab-button active" data-tab="homeTab">Home</button>
      <button class="tab-button" data-tab="houseTab">House Meeting</button>
    </div>

    <!-- Home Tab Content -->
    <div class="vb-tab-content active" id="homeTab">
      <p>This is the home page. Here you can see general info and navigate to the house meeting form.</p>
    </div>

    <!-- House Meeting Tab Content -->
    <div class="vb-tab-content" id="houseTab">
      <p>Go to the house meeting attendance form:</p>
      <a href="house.html" class="tab-button" style="text-decoration:none;">Open House Meeting Form</a>
    </div>

  </div>
</div>

<script>
  // Tab switching logic
  const tabButtons = document.querySelectorAll('.tab-button');
  const tabContents = document.querySelectorAll('.vb-tab-content');

  tabButtons.forEach(btn => {
    btn.addEventListener('click', () => {
      tabButtons.forEach(b => b.classList.remove('active'));
      tabContents.forEach(c => c.classList.remove('active'));
      btn.classList.add('active');
      const tabId = btn.dataset.tab;
      document.getElementById(tabId).classList.add('active');
    });
  });
</script>

</body>
</html>

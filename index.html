<!DOCTYPE html>
<html>
<head>
  <title>Villa Bravado House Meeting</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>

<body>

<div class="vb-wrap">
  <div class="vb-card">
    <div class="vb-header">
      <div class="vb-badge">VB</div>
      <div>
        <h1>Villa Bravado</h1>
        <p>House Meeting Attendance Register</p>
      </div>
    </div>

    <form class="vb-form" id="attendanceForm" novalidate>

      <div class="vb-field">
        <fieldset class="vb-fieldset">
          <legend>Cub or Senior</legend>
          <label><input type="radio" name="status" value="Cub" required> Cub</label>
          <label><input type="radio" name="status" value="Senior" required> Senior</label>
        </fieldset>
        <small class="vb-error" id="error-status"></small>
      </div>

      <div class="vb-field">
        <label>Full Name</label>
        <input type="text" name="full_name" placeholder="e.g., Sphesihle Zisongo" required>
        <small class="vb-error" id="error-full_name"></small>
      </div>

      <div class="vb-field">
        <label>Room Number</label>
        <input type="text" name="room_number" placeholder="e.g., B12" required>
        <small class="vb-error" id="error-room_number"></small>
      </div>

      <div class="vb-field">
        <label>Student Number</label>
        <input type="text" name="student_number" placeholder="2023123456" maxlength="10" minlength="10" required>
        <small class="vb-error" id="error-student_number"></small>
      </div>

      <div class="vb-field">
        <label>Meeting PIN</label>
        <input type="password" name="meeting_pin" maxlength="6" required>
        <small class="vb-error" id="error-meeting_pin"></small>
      </div>

      <div class="vb-field">
        <button type="submit" id="submitBtn" class="vb-button" disabled>Submit Attendance</button>
        <small class="vb-error" id="error-form"></small>
      </div>

      <p id="successMsg" style="color: lightgreen; font-weight:bold; display:none;">
        Attendance submitted successfully!
      </p>

    </form>
  </div>
</div>

<!-- POPUP MODAL FOR INCORRECT PIN -->
<div id="pinModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.6); justify-content:center; align-items:center;">
  <div style="background:#111; color:white; padding:20px; border:2px solid gold; border-radius:8px; max-width:400px; text-align:center;">
    <p style="margin-bottom:20px;">❌ The PIN you entered is incorrect.</p>
    <button id="pinModalOk" style="padding:10px 20px; background:gold; border:none; cursor:pointer;">OK</button>
  </div>
</div>

<style>
body{ background:#0c0c0f; color:white; font-family:Arial; padding:20px; }
.vb-card{ max-width:640px; margin:auto; padding:25px; border:1px solid gold; border-radius:12px; }
.vb-form{ display:grid; gap:12px; }
.vb-field{ display:flex; flex-direction:column; gap:6px; }
.vb-button{ padding:12px; background:gold; border:none; cursor:pointer; }
.vb-button:disabled{ opacity:0.5; cursor:not-allowed; }
.vb-error{ color:#ff6b6b; font-size:12px; min-height:16px; }
.vb-error:empty{ display:none; }
</style>

<script>
const button = document.getElementById("submitBtn");
const successMsg = document.getElementById("successMsg");
const form = document.getElementById("attendanceForm");

const pinModal = document.getElementById("pinModal");
const pinModalOk = document.getElementById("pinModalOk");

const fields = [
  { name: "status", errorId: "error-status" },
  { name: "full_name", errorId: "error-full_name" },
  { name: "room_number", errorId: "error-room_number" },
  { name: "student_number", errorId: "error-student_number" },
  { name: "meeting_pin", errorId: "error-meeting_pin" }
];

function getFieldElement(name) {
  return form.querySelector(`[name="${name}"]`);
}

function showError(name, message) {
  const errorEl = document.getElementById(`error-${name}`);
  if (errorEl) errorEl.textContent = message || "";
}

function validateField(name) {
  const el = getFieldElement(name);
  if (!el) return true;
  if (el.type === "radio") {
    const checked = form.querySelector(`input[name="${name}"]:checked`);
    if (!checked) {
      showError(name, "Please choose one option.");
      return false;
    }
    showError(name, "");
    return true;
  }
  if (!el.checkValidity()) {
    showError(name, el.validationMessage);
    return false;
  }
  showError(name, "");
  return true;
}

function validateAll() {
  const ok = fields.every(f => validateField(f.name));
  button.disabled = !ok;
  return ok;
}

form.addEventListener("input", (e) => {
  if (e.target.name) validateField(e.target.name);
  validateAll();
});

form.addEventListener("change", (e) => {
  if (e.target.name) validateField(e.target.name);
  validateAll();
});

validateAll();

// Supabase
const supabaseUrl = 'https://hldtrofwejpxixtbrthz.supabase.co';
const supabaseKey = 'YOUR_SUPABASE_ANON_KEY_HERE';
const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  document.getElementById("error-form").textContent = "";
  showError("meeting_pin", "");
  button.disabled = true;
  const originalText = button.textContent;
  button.textContent = "Submitting...";

  try {
    // Fetch correct PIN from meeting_settings
    const { data: pinData, error: pinError } = await supabaseClient
      .from('meeting_settings')
      .select('meeting_pin')
      .single();

    if (pinError) throw pinError;

    // Check PIN
    if (form.meeting_pin.value.trim() !== pinData.meeting_pin) {
      // Show popup modal
      pinModal.style.display = "flex";
      button.disabled = false;
      button.textContent = originalText;
      return;
    }

    // Insert attendance only if PIN is correct
    const dataToInsert = {
      status: form.status.value,
      full_name: form.full_name.value.trim(),
      room_number: form.room_number.value.trim(),
      student_number: form.student_number.value.trim()
    };

    const { error } = await supabaseClient
      .from('attendanceMeeting')
      .insert([dataToInsert]);

    if (error) throw error;

    successMsg.style.display = 'block';
    form.reset();
    validateAll();
    setTimeout(() => { successMsg.style.display = 'none'; }, 3000);

  } catch (err) {
    console.error(err);
    document.getElementById("error-form").textContent =
      "Error submitting attendance: " + err.message;
    button.disabled = false;
    button.textContent = originalText;
  } finally {
    button.textContent = originalText;
  }
});

// Popup modal OK button
pinModalOk.addEventListener("click", () => {
  pinModal.style.display = "none";
  form.meeting_pin.value = ""; // clear the PIN input
  form.meeting_pin.focus();
});
</script>

</body>
</html>
